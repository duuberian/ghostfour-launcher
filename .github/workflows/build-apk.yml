name: Build GhostFour APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'ghostfour-launcher/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghostfour-launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f ./gradlew ]; then
            sudo apt-get update
            sudo apt-get install -y gradle
            gradle wrapper
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostfour-debug-apk
          path: ghostfour-launcher/app/build/outputs/apk/debug/app-debug.apk
